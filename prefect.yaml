name: roletrando
prefect-version: "3.6"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:
  - name: binance-ohlc-5m-prod
    entrypoint: flows/binance_ohlc.py:binance_ohlc_pipeline
    parameters:
      interval: "5m"
    schedules:
      - cron: "*/1 * * * *"
    work_pool:
      name: my-pool

  - name: binance-ohlc-30m-prod
    entrypoint: flows/binance_ohlc.py:binance_ohlc_pipeline
    parameters:
      interval: "30m"
    schedules:
      - cron: "*/10 * * * *"
    work_pool:
      name: my-pool

  - name: binance-ohlc-4h-prod
    entrypoint: flows/binance_ohlc.py:binance_ohlc_pipeline
    parameters:
      interval: "4h"
    schedules:
      - cron: "0 */1 * * *"
    work_pool:
      name: my-pool

  - name: currency-history-prod
    entrypoint: flows/currency_history.py:currency_history_pipeline
    schedules:
      - cron: "0 9 * * 1-5"
    work_pool:
      name: my-pool

  - name: github-stars-prod
    entrypoint: flows/github_stars.py:github_stars
    parameters:
      repos:
        - prefecthq/prefect
    schedules:
      - cron: "*/10 * * * *"
    work_pool:
      name: my-pool

  - name: tuya-weather-prod
    entrypoint: flows/tuya_weather.py:tuya_weather_pipeline
    schedules:
      - cron: "*/5 * * * *"
    work_pool:
      name: my-pool

  - name: openweather-weather-prod
    entrypoint: flows/openweather_weather.py:openweather_weather
    schedules:
      - cron: "*/20 * * * *"
    work_pool:
      name: my-pool

  - name: openweather-forecast-prod
    entrypoint: flows/openweather_forecast.py:openweather_forecast
    schedules:
      - cron: "*/60 * * * *"
    work_pool:
      name: my-pool

  - name: currency-spot-prod
    entrypoint: flows/currency_spot.py:currency_spot_pipeline
    schedules:
      - cron: "*/15 * * * *"
    work_pool:
      name: my-pool

  - name: despesas-pipeline-prod
    entrypoint: flows/despesas.py:despesas_pipeline
    schedules:
      - cron: "0 4 * * *"
    work_pool:
      name: my-pool

  - name: oilprice-fred-history-prod
    entrypoint: flows/oilprice_fred_history.py:oilprice_fred_history_pipeline
    schedules:
      - cron: "0 6 * * 1-5"
    work_pool:
      name: my-pool

  - name: oilprice-history-prod
    entrypoint: flows/oilprice_history.py:oilprice_history_pipeline
    schedules:
      - cron: "0 9 * * 1-5"
    work_pool:
      name: my-pool

  - name: oilprice-spot-prod
    entrypoint: flows/oilprice_spot.py:oilprice_spot_pipeline
    schedules:
      - cron: "*/15 * * * *"
    work_pool:
      name: my-pool

  - name: noticias-flazoeiro-prod
    entrypoint: flows/noticias_flazoeiro_orchestrator.py:noticias_flazoeiro_orchestrator
    schedules:
      - cron: "0 */3 * * *"
    work_pool:
      name: my-pool
